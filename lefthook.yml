pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint {staged_files}
    format:
      run: bunx oxfmt --check {staged_files}
    db-check:
      run: bun --cwd apps/api db:check
      fail_text: "drizzle-kit check falhou — schema e migrations divergem"
      skip:
        - run: test ! -d apps/api
