services:
  db_test:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: template_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d template_test"]
      interval: 2s
      timeout: 5s
      retries: 10
